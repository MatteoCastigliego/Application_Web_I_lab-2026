<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="description" content="Q&A">
    <meta name="author" content="Web Applications">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link href="styles.css" rel="stylesheet">

<body>
    <header>
        <nav class="navbar bg-body-tertiary">
            <div class="container-fluid">
                <a class="navbar-brand"><i class="bi bi-film"></i>Film Library</a>
                <form class="d-flex" role="search">
                    <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" />

                </form>
            </div>
        </nav>
    </header>
    <main>
        <div class="row">
            <div class="col-3">
                <h3>Filters</h3>
                <ul class="list-group">
                    <li class="list-group-item active" aria-current="true">All</li>
                    <li class="list-group-item">Favorited</li>
                    <li class="list-group-item">Best Rated</li>
                    <li class="list-group-item">Seen Last Month</li>
                    <li class="list-group-item">Unseen</li>
                </ul>
            </div>
            <div class="col-9">
                <h1>All films</h1>
                <ul class="list-group">
                    <li class="list-group-item"><i class="bi bi-heart"></i>Pulp Fiction<span class="ms-3">
                            <i class="bi bi-star-fill"></i>
                            <i class="bi bi-star"></i>
                            <i class="bi bi-star"></i>
                            <i class="bi bi-star"></i>
                            <i class="bi bi-star"></i>
                        </span><i class="bi bi-pencil-square"></i><i class="bi bi-trash3"></i></li>
                    <li class="list-group-item"><i class="bi bi-heart-fill"></i>La casa di carta<span class="ms-3">
                            <i class="bi bi-star-fill"></i>
                            <i class="bi bi-star-fill"></i>
                            <i class="bi bi-star-fill"></i>
                            <i class="bi bi-star-fill"></i>
                            <i class="bi bi-star"></i>
                        </span><i class="bi bi-pencil-square"></i><i class="bi bi-trash3"></i></li>
                    <li class="list-group-item"><i class="bi bi-heart-fill"></i>Suits<span class="ms-3">
                            <i class="bi bi-star-fill"></i>
                            <i class="bi bi-star-fill"></i>
                            <i class="bi bi-star-fill"></i>
                            <i class="bi bi-star-fill"></i>
                            <i class="bi bi-star-fill"></i>
                        </span><i class="bi bi-pencil-square"></i><i class="bi bi-trash3"></i></li>
                    <li class="list-group-item"><i class="bi bi-heart-half"></i>Breaking bad<span class="ms-3">
                            <i class="bi bi-star-fill"></i>
                            <i class="bi bi-star-fill"></i>
                            <i class="bi bi-star-fill"></i>
                            <i class="bi bi-star"></i>
                            <i class="bi bi-star"></i>
                        </span><i class="bi bi-pencil-square"></i><i class="bi bi-trash3"></i></li>
                    <li class="list-group-item"><i class="bi bi-heart-fill"></i>Formula 1<span class="ms-3">
                            <i class="bi bi-star-fill"></i>
                            <i class="bi bi-star-fill"></i>
                            <i class="bi bi-star-fill"></i>
                            <i class="bi bi-star-fill"></i>
                            <i class="bi bi-star-fill"></i>
                        </span><i class="bi bi-pencil-square"></i><i class="bi bi-trash3"></i></li>
                </ul>
